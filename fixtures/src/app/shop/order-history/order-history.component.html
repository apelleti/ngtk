<div class="order-history">
  <h2 class="history-title">Order History</h2>
  <table class="orders-table">
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Total</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      @for (order of orders(); track order.id) {
        <tr class="order-row">
          <td>{{ order.id }}</td>
          <td>{{ order.date }}</td>
          <td>${{ order.total }}</td>
          <td><span class="status-badge" [class]="'status-' + order.status">{{ order.status }}</span></td>
        </tr>
      }
    </tbody>
  </table>
</div>
